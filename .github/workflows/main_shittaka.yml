# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - Shittaka

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api_publish' # prepared deployment package path
  AZURE_FUNCTIONAPP_SOURCE_PATH: './api'
  NODE_VERSION: '22.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v5

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'

      - name: 'Resolve Project Dependencies Using Npm'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}'
          npm ci
          npm run build --if-present
          npm run test --if-present
          # Keep runtime dependencies only for deploy package.
          npm prune --omit=dev
          popd

      - name: Prepare deploy package (no remote build required)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          mkdir -p "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/host.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/package.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/package-lock.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp -R "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/dist" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/dist"
          cp -R "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/node_modules" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/node_modules"

      - name: 'Run Azure Functions Action (attempt 1)'
        id: deploy1
        continue-on-error: true
        uses: Azure/functions-action@v1
        with:
          app-name: 'Shittaka'
          sku: 'flexconsumption'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          remote-build: false
          respect-funcignore: false

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        shell: bash
        run: sleep 20

      - name: 'Run Azure Functions Action (attempt 2)'
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: Azure/functions-action@v1
        with:
          app-name: 'Shittaka'
          sku: 'flexconsumption'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          remote-build: false
          respect-funcignore: false

      - name: Fail job if both deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        shell: bash
        run: |
          echo "Deployment failed on both attempts."
          exit 1
