# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - Shittaka

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api_publish' # prepared deployment package path
  AZURE_FUNCTIONAPP_SOURCE_PATH: './api'
  NODE_VERSION: '22.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v5

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'

      - name: 'Resolve Project Dependencies Using Npm'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}'
          npm ci
          npm run build --if-present
          npm run test --if-present
          # Keep runtime dependencies only for deploy package.
          npm prune --omit=dev
          popd

      - name: Prepare deploy package (no remote build required)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          mkdir -p "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/host.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/package.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/package-lock.json" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/"
          cp -R "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/dist" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/dist"
          cp -R "${{ env.AZURE_FUNCTIONAPP_SOURCE_PATH }}/node_modules" "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/node_modules"

      - name: Create deployment zip
        shell: bash
        run: |
          set -euo pipefail
          rm -f functionapp.zip
          (cd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}" && zip -r ../functionapp.zip .)
          ls -lh functionapp.zip

      - name: Deploy via Kudu ZipDeploy (retry x2)
        shell: bash
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE:-}" ]; then
            echo "Missing secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE"
            exit 1
          fi

          python - <<'PY'
          import base64
          import os
          import sys
          import time
          import urllib.request
          from xml.etree import ElementTree as ET

          profile = os.environ.get("AZURE_FUNCTIONAPP_PUBLISH_PROFILE", "").strip()
          root = ET.fromstring(profile)
          target = None
          for p in root.findall(".//publishProfile"):
              method = (p.attrib.get("publishMethod") or "").lower()
              url = p.attrib.get("publishUrl") or ""
              if "zipdeploy" in method or ".scm." in url:
                  target = p
                  break
          if target is None:
              target = root.find(".//publishProfile")
          if target is None:
              print("No publishProfile entry found")
              sys.exit(1)

          user = target.attrib.get("userName", "")
          pwd = target.attrib.get("userPWD", "")
          publish_url = target.attrib.get("publishUrl", "")
          if not user or not pwd or not publish_url:
              print("Publish profile is missing userName/userPWD/publishUrl")
              sys.exit(1)

          host = publish_url.split(":")[0]
          if ".scm." not in host:
              if ".azurewebsites." in host:
                  host = host.replace(".azurewebsites.", ".scm.azurewebsites.")
              else:
                  host = host + ".scm.azurewebsites.net"

          endpoint = f"https://{host}/api/zipdeploy"
          with open("functionapp.zip", "rb") as f:
              body = f.read()
          token = base64.b64encode(f"{user}:{pwd}".encode()).decode()
          headers = {
              "Authorization": f"Basic {token}",
              "Content-Type": "application/zip",
          }

          last_err = None
          for i in range(1, 3):
              print(f"ZipDeploy attempt {i} -> {endpoint}")
              req = urllib.request.Request(endpoint, data=body, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      print(f"Deploy accepted. status={resp.status}")
                      sys.exit(0)
              except Exception as e:
                  last_err = e
                  print(f"Attempt {i} failed: {e}")
                  if i < 2:
                      time.sleep(20)
          print(f"Deployment failed after retries: {last_err}")
          sys.exit(1)
          PY
