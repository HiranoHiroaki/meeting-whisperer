# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - Shittaka

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api' # Azure Functions project path
  NODE_VERSION: '22.x'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v5

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'

      - name: 'Resolve Project Dependencies Using Npm'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm ci
          npm run build --if-present
          npm run test --if-present
          popd

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Function App resource group
        id: rg
        shell: bash
        run: |
          set -euo pipefail
          RG="$(az functionapp show --name 'Shittaka' --query resourceGroup -o tsv)"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "Resolved resource group: $RG"

      - name: Preflight app settings (sanitized)
        shell: bash
        run: |
          set -euo pipefail
          az functionapp config appsettings list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --name 'Shittaka' \
            --query "[?name=='AzureWebJobsStorage' || name=='FUNCTIONS_WORKER_RUNTIME' || name=='FUNCTIONS_EXTENSION_VERSION'].{name:name, hasValue:(value!=null && value!='')}" \
            -o table

      - name: Restart Function App before deploy
        shell: bash
        run: |
          set -euo pipefail
          az functionapp restart \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --name 'Shittaka'

      - name: 'Run Azure Functions Action (attempt 1)'
        id: deploy1
        continue-on-error: true
        uses: Azure/functions-action@v1
        with:
          app-name: 'Shittaka'
          sku: 'flexconsumption'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # Flex Consumption requires OneDeploy remote build.
          remote-build: true
          respect-funcignore: true

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        shell: bash
        run: sleep 20

      - name: Restart Function App before deploy retry
        if: steps.deploy1.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          az functionapp restart \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --name 'Shittaka'

      - name: 'Run Azure Functions Action (attempt 2)'
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: Azure/functions-action@v1
        with:
          app-name: 'Shittaka'
          sku: 'flexconsumption'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          remote-build: true
          respect-funcignore: true

      - name: Show OneDeploy diagnostics on failure
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        shell: bash
        run: |
          set +e
          APP_ID="$(az functionapp show --name 'Shittaka' --resource-group "${{ steps.rg.outputs.resource_group }}" --query id -o tsv)"
          echo "Function App id: $APP_ID"
          az rest --method get --url "https://management.azure.com${APP_ID}/extensions/onedeploy?api-version=2022-03-01" -o jsonc
          echo "Listing deployment app settings (sanitized):"
          az functionapp config appsettings list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --name 'Shittaka' \
            --query "[?contains(name,'WEBSITE_') || name=='AzureWebJobsStorage' || contains(name,'SCM_') || contains(name,'ENABLE_ORYX')].{name:name, hasValue:(value!=null && value!='')}" \
            -o table

      - name: Fail job if both deploy attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        shell: bash
        run: |
          echo "Deployment failed on both attempts."
          exit 1
