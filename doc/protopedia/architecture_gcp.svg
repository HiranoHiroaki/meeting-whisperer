<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="880" viewBox="0 0 1280 880" font-family="'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#EA4335"/>
    </marker>
  </defs>

  <rect width="1280" height="880" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="52" font-size="28" font-weight="700" fill="#202124">知ったかくん (Meeting Whisperer) — システム構成</text>
  <text x="60" y="82" font-size="16" fill="#5f6368">Google Cloud / Cloud Run 単一コンテナ構成・全認証 ADC（APIキーレス）</text>

  <!-- Browser -->
  <rect x="60" y="110" width="880" height="145" rx="12" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
  <text x="90" y="142" font-size="18" font-weight="700" fill="#174EA6">ブラウザ (Vanilla JS)</text>
  <rect x="90" y="160" width="260" height="70" rx="8" fill="#ffffff" stroke="#AECBFA"/>
  <text x="110" y="188" font-size="14.5" font-weight="600" fill="#202124">演出デモ</text>
  <text x="110" y="210" font-size="13" fill="#5f6368">会議ログ再生・用語チップ化</text>
  <rect x="370" y="160" width="260" height="70" rx="8" fill="#ffffff" stroke="#AECBFA"/>
  <text x="390" y="188" font-size="14.5" font-weight="600" fill="#202124">音声入力 Beta</text>
  <text x="390" y="210" font-size="13" fill="#5f6368">MediaRecorder 約5秒ごと録音</text>
  <rect x="650" y="160" width="260" height="70" rx="8" fill="#ffffff" stroke="#AECBFA"/>
  <text x="670" y="188" font-size="14.5" font-weight="600" fill="#202124">Meet取込 (Mock)</text>
  <text x="670" y="210" font-size="13" fill="#5f6368">本番連携ルート設計済み</text>

  <!-- localStorage -->
  <rect x="980" y="110" width="240" height="145" rx="12" fill="#FEF7E0" stroke="#F9AB00" stroke-width="2"/>
  <text x="1000" y="145" font-size="15" font-weight="700" fill="#B06000">localStorage /</text>
  <text x="1000" y="167" font-size="15" font-weight="700" fill="#B06000">sessionStorage</text>
  <text x="1000" y="196" font-size="13.5" fill="#5f6368">自分辞書・学習ワード</text>
  <text x="1000" y="216" font-size="13.5" fill="#5f6368">（サーバに個人データを</text>
  <text x="1000" y="234" font-size="13.5" fill="#5f6368">　持たない）</text>
  <line x1="940" y1="182" x2="980" y2="182" stroke="#F9AB00" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Browser -> Cloud Run -->
  <line x1="500" y1="255" x2="500" y2="312" stroke="#5f6368" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="518" y="290" font-size="13.5" fill="#5f6368">HTTPS / JSON（音声は base64 セグメント）</text>

  <!-- Cloud Run -->
  <rect x="60" y="318" width="880" height="290" rx="12" fill="#E6F4EA" stroke="#34A853" stroke-width="2.5"/>
  <text x="90" y="350" font-size="18" font-weight="700" fill="#0D652D">Cloud Run — meeting-whisperer（静的UI + API を1コンテナ同居 / min-instances=0）</text>

  <rect x="90" y="368" width="390" height="216" rx="8" fill="#ffffff" stroke="#A8DAB5"/>
  <text x="110" y="396" font-size="15" font-weight="700" fill="#202124">API (Node.js / TypeScript)</text>
  <text x="110" y="424" font-size="13.5" fill="#202124">/api/extractTerms — 用語抽出 (Fast:辞書 / Full:AI)</text>
  <text x="110" y="450" font-size="13.5" fill="#202124">/api/explainTerm — 文脈込み用語説明</text>
  <text x="110" y="476" font-size="13.5" fill="#202124">/api/generateNotes — 知ったかまとめ生成</text>
  <text x="110" y="502" font-size="13.5" fill="#202124">/api/generateMinutes — 議事録生成</text>
  <text x="110" y="528" font-size="13.5" fill="#202124">/api/transcribeAudio — 音声文字起こし中継</text>
  <text x="110" y="562" font-size="12.5" fill="#5f6368">Rate Limit / CORS / 入力サイズ制限 / パス正規化</text>

  <rect x="510" y="368" width="400" height="128" rx="8" fill="#ffffff" stroke="#A8DAB5"/>
  <text x="530" y="396" font-size="15" font-weight="700" fill="#202124">Dictionary Dispatcher（自律判断）</text>
  <text x="530" y="424" font-size="13.5" fill="#202124">固定辞書8分野 + プロジェクト辞書 + 自分辞書</text>
  <text x="530" y="450" font-size="13.5" fill="#202124">用語ごとに「辞書で即答 / AIに委譲 /</text>
  <text x="530" y="474" font-size="13.5" fill="#202124">フォールバック」を判定 — AIを呼ばない判断も仕事</text>

  <rect x="510" y="512" width="400" height="72" rx="8" fill="#ffffff" stroke="#A8DAB5"/>
  <text x="530" y="540" font-size="15" font-weight="700" fill="#202124">静的UI配信</text>
  <text x="530" y="566" font-size="13.5" fill="#202124">web/ を同一コンテナから配信（CDN不要の最小構成）</text>

  <!-- Cloud Run -> Vertex / STT -->
  <line x1="300" y1="608" x2="300" y2="662" stroke="#5f6368" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="608" x2="720" y2="662" stroke="#5f6368" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="380" y="640" font-size="13.5" font-weight="600" fill="#0D652D">ADC認証（APIキーを一切持たない）</text>

  <!-- Vertex AI -->
  <rect x="120" y="668" width="360" height="92" rx="12" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
  <text x="145" y="702" font-size="16.5" font-weight="700" fill="#174EA6">Vertex AI — Gemini 2.5 Flash</text>
  <text x="145" y="730" font-size="13.5" fill="#5f6368">用語説明・Full抽出・まとめ/議事録生成</text>

  <!-- STT -->
  <rect x="540" y="668" width="360" height="92" rx="12" fill="#E8F0FE" stroke="#4285F4" stroke-width="2"/>
  <text x="565" y="702" font-size="16.5" font-weight="700" fill="#174EA6">Cloud Speech-to-Text</text>
  <text x="565" y="730" font-size="13.5" fill="#5f6368">音声セグメント文字起こし（sync recognize）</text>

  <!-- Meet (concept) -->
  <rect x="980" y="318" width="240" height="176" rx="12" fill="#FCE8E6" stroke="#EA4335" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="1000" y="350" font-size="15" font-weight="700" fill="#A50E0E">Google Meet REST API</text>
  <text x="1000" y="376" font-size="13" fill="#5f6368">conferenceRecords</text>
  <text x="1000" y="398" font-size="13" fill="#5f6368">→ transcripts → entries</text>
  <text x="1000" y="426" font-size="13" fill="#5f6368">OAuth同意フロー前提</text>
  <text x="1000" y="452" font-size="13" font-weight="600" fill="#A50E0E">構想（現在は Mock、</text>
  <text x="1000" y="472" font-size="13" font-weight="600" fill="#A50E0E">ルート設計ドキュメント有）</text>
  <line x1="940" y1="406" x2="978" y2="406" stroke="#EA4335" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowDash)"/>

  <!-- Footer -->
  <rect x="60" y="792" width="1160" height="56" rx="10" fill="#F1F3F4"/>
  <text x="85" y="826" font-size="14.5" fill="#3c4043">デプロイ: gcloud run deploy --source .（Cloud Build がビルド）　／　セキュリティ: ブラウザにもリポジトリにもAPIキーを置かない（全認証 ADC）・プロンプトインジェクション対策・Rate Limit</text>
</svg>
